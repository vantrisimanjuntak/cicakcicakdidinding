name: cicak-deploy
on:
  push:
    branches:
      - "main"
      
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote SSH commands using SSH key
        uses: appleboy/ssh-action@v1
        with:
          host: 103.65.236.98
          username: root
          key: ${{secrets.CICAK_SSH_KEY}}
          port: 2233
          script: whoami
