name: cicak-deploy
on:
  push:
    branches:
      - "main"
      
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Execute remote SSH commands using SSH key
        uses: appleboy/ssh-action@v1
        with:
          host: 103.65.236.98
          username: cicak
          key: ${{secrets.CICAK_SSH_KEY}}
          port: 2233
          script: |
            pwd && ls -la
            cp ../index.php /home/cicak/public_html/
